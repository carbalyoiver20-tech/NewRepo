<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Sistema de Análisis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background-color: #f1f5f9; font-family: sans-serif; margin: 0;">
    <div style="max-width: 420px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
        <h1 style="color: #1e3a8a; text-align: center; font-size: 28px; margin-bottom: 5px;">¡Bienvenido!</h1>
        <p style="color: #64748b; text-align: center; margin-top: 0; margin-bottom: 30px; font-size: 15px;">Sistema de Análisis de Datos Abiertos</p>
        
        {% if error %}
            <div style="background-color: #fee2e2; color: #dc2626; padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 14px;">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <div style="margin-bottom: 18px;">
                <label style="display: block; margin-bottom: 6px; font-weight: bold; color: #334155;">Usuario Administrador:</label>
                <input type="text" name="username" required placeholder="Ej: admin" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 6px; font-weight: bold; color: #334155;">Contraseña:</label>
                <input type="password" name="password" required placeholder="••••••••" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            </div>

            <button type="submit" style="width: 100%; background-color: #1e3a8a; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">Ingresar al Panel</button>
        </form>
    </div>
</body>
</html>
