<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container form-container">
        <h1>Modificar Registro #{{ registro[0] }}</h1>
        <form method="POST" class="crud-form">
            <label>Año:</label>
            <input type="number" name="ano" value="{{ registro[3] }}" required>

            <label>Departamento:</label>
            <input type="text" name="departamento" value="{{ registro[1] }}" required>

            <label>Municipio:</label>
            <input type="text" name="municipio" value="{{ registro[2] }}" required>

            <label>Total Impuesto ($):</label>
            <input type="number" step="0.01" name="totalimpuesto" value="{{ registro[4] }}" required>

            <div class="btn-group-form">
                <button type="submit" class="btn btn-save">Actualizar</button>
                <a href="{{ url_for('index') }}" class="btn btn-cancel">Volver</a>
            </div>
        </form>
    </div>
</body>
</html>
