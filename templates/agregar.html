<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container form-container">
        <h1>Agregar Nuevo Registro de Impuesto</h1>
        <form method="POST" class="crud-form">
            <label>Año:</label>
            <input type="number" name="ano" required min="2000" max="2030">

            <label>Departamento:</label>
            <input type="text" name="departamento" required placeholder="Ej: ANTIOQUIA">

            <label>Municipio:</label>
            <input type="text" name="municipio" required placeholder="Ej: MEDELLIN">

            <label>Total Impuesto ($):</label>
            <input type="number" step="0.01" name="totalimpuesto" required>

            <div class="btn-group-form">
                <button type="submit" class="btn btn-save">Guardar Registro</button>
                <a href="{{ url_for('index') }}" class="btn btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
